<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low Poly Sunset Valley POC</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* A CSS gradient serves as a beautiful, performant sky background */
            background: linear-gradient(180deg, #87CEEB 0%, #FFB6C1 40%, #FFDAB9 70%, #FFA07A 100%);
            font-family: 'Inter', sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            font-size: 14px;
            backdrop-filter: blur(4px);
            user-select: none;
        }
    </style>
    <!-- Include Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui-layer">Drag to look around</div>

    <script>
        let scene, camera, renderer, controls;

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            // We don't set scene.background so the CSS gradient shows through the transparent renderer

            // Camera setup - low angle to match the reference image perspective
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 25);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Ambient light for base illumination
            const ambientLight = new THREE.AmbientLight(0xfff0e6, 0.5); // Warm tint
            scene.add(ambientLight);

            // Directional light simulating the setting/rising sun
            const dirLight = new THREE.DirectionalLight(0xffdcb4, 1.2);
            dirLight.position.set(50, 40, -40); // Coming from top right background
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 150;
            dirLight.shadow.camera.left = -50;
            dirLight.shadow.camera.right = 50;
            dirLight.shadow.camera.top = 50;
            dirLight.shadow.camera.bottom = -50;
            scene.add(dirLight);

            // Fill light from the opposite side to soften dark shadows
            const fillLight = new THREE.DirectionalLight(0x87CEEB, 0.3); // Cool blue sky reflection
            fillLight.position.set(-40, 20, 20);
            scene.add(fillLight);

            createTerrain();
            createMountains();
            createClouds();
            
            createTrees();
            createSheep();
            createForegroundElements();

            // OrbitControls for the "drag to move slightly" effect
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = false; // Disable zooming to keep perspective fixed
            controls.enablePan = false;
            
            // Restrict movement to create a diorama window effect rather than full free-roam
            controls.minAzimuthAngle = -Math.PI / 8; // Restrict left/right rotation
            controls.maxAzimuthAngle = Math.PI / 8;
            controls.minPolarAngle = Math.PI / 2.5; // Restrict up/down rotation
            controls.maxPolarAngle = Math.PI / 2.05;
            controls.target.set(0, 3, 0); // Look slightly down into the valley

            window.addEventListener('resize', onWindowResize, false);

            animate();
        }

        function createTerrain() {
            // Midground rolling hills
            const geometry = new THREE.PlaneGeometry(120, 100, 40, 40);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                // Procedural generation using sine waves for rolling hills
                let y = Math.sin(x * 0.05) * 3 + Math.cos(z * 0.05) * 3;
                y += Math.sin(x * 0.1 + z * 0.1) * 1.5;
                // Flatten the center slightly for the valley
                if (Math.abs(x) < 20 && Math.abs(z) < 20) {
                    y *= 0.5;
                }
                pos.setY(i, y);
            }
            geometry.computeVertexNormals();

            // Material: MeshStandardMaterial with flatShading is key for low-poly look
            const material = new THREE.MeshStandardMaterial({
                color: 0x7b9c44, // Warm grassy green
                flatShading: true,
                roughness: 0.8,
                metalness: 0.1
            });

            const terrain = new THREE.Mesh(geometry, material);
            terrain.receiveShadow = true;
            terrain.castShadow = true;
            terrain.position.set(0, 0, -20);
            scene.add(terrain);
        }

        function createMountains() {
            // Background jagged mountains
            const geometry = new THREE.PlaneGeometry(200, 60, 30, 10);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                // Sharp peaks
                let y = Math.abs(Math.sin(x * 0.03)) * 20 + Math.random() * 5;
                // Slope down towards the edges
                y -= Math.abs(z * 0.2);
                pos.setY(i, y);
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                color: 0x8a8b75, // Distant hazy mountain color
                flatShading: true,
                roughness: 0.9,
            });

            const mountains = new THREE.Mesh(geometry, material);
            mountains.position.set(0, 5, -70);
            scene.add(mountains);
        }

        function createClouds() {
            const cloudGeo = new THREE.IcosahedronGeometry(1, 0);
            const cloudMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                flatShading: true,
                transparent: true,
                opacity: 0.9
            });

            for (let i = 0; i < 8; i++) {
                const cloud = new THREE.Group();
                // Cluster 3-5 spheres to make a fluffy low-poly cloud
                const parts = 3 + Math.floor(Math.random() * 3);
                for (let j = 0; j < parts; j++) {
                    const mesh = new THREE.Mesh(cloudGeo, cloudMat);
                    mesh.position.set(
                        (Math.random() - 0.5) * 4,
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 3
                    );
                    const scale = 1 + Math.random() * 2;
                    mesh.scale.set(scale, scale, scale);
                    mesh.castShadow = true;
                    cloud.add(mesh);
                }
                
                // Position clouds in the sky
                cloud.position.set(
                    (Math.random() - 0.5) * 100,
                    25 + Math.random() * 15,
                    -30 - Math.random() * 40
                );
                scene.add(cloud);
            }
        }

        function createTrees() {
            // Reusable geometries for trees
            const trunkGeo = new THREE.CylinderGeometry(0.3, 0.5, 2, 5);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, flatShading: true });
            
            // Dodecahedron for low-poly leafy canopy
            const leavesGeo = new THREE.DodecahedronGeometry(2, 0); 
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x3a5f0b, flatShading: true });

            // Create clusters of trees
            for (let i = 0; i < 20; i++) {
                const tree = new THREE.Group();
                
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.y = 1;
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                tree.add(trunk);

                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.y = 2.5;
                // Randomize leaf shape slightly
                leaves.scale.set(1 + Math.random()*0.5, 1 + Math.random()*0.5, 1 + Math.random()*0.5);
                leaves.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                leaves.castShadow = true;
                leaves.receiveShadow = true;
                tree.add(leaves);

                // Scatter mostly in the mid-left and mid-right
                const x = (Math.random() - 0.5) * 80;
                const z = -10 - Math.random() * 30;
                // Roughly place on terrain surface
                const y = Math.sin(x * 0.05) * 3 + Math.cos(z * 0.05) * 3 + Math.sin(x * 0.1 + z * 0.1) * 1.5;
                
                tree.position.set(x, y - 0.5, z);
                scene.add(tree);
            }
        }

        function createSheep() {
            // Sheep parts
            const bodyGeo = new THREE.BoxGeometry(1.2, 0.8, 1.5);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, flatShading: true });
            const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.6);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x222222, flatShading: true });
            const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.8, 4);

            for (let i = 0; i < 15; i++) {
                const sheep = new THREE.Group();

                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.8;
                body.castShadow = true;
                sheep.add(body);

                const head = new THREE.Mesh(headGeo, headMat);
                head.position.set(0, 1.2, 0.8);
                head.castShadow = true;
                sheep.add(head);

                // 4 Legs
                const legPositions = [
                    [-0.4, 0.4, 0.5], [0.4, 0.4, 0.5],
                    [-0.4, 0.4, -0.5], [0.4, 0.4, -0.5]
                ];
                legPositions.forEach(pos => {
                    const leg = new THREE.Mesh(legGeo, headMat);
                    leg.position.set(pos[0], pos[1], pos[2]);
                    leg.castShadow = true;
                    sheep.add(leg);
                });

                // Random rotation
                sheep.rotation.y = Math.random() * Math.PI * 2;

                // Scatter in the valley
                const x = (Math.random() - 0.5) * 40;
                const z = -5 - Math.random() * 20;
                let y = Math.sin(x * 0.05) * 3 + Math.cos(z * 0.05) * 3;
                if (Math.abs(x) < 20 && Math.abs(z) < 20) y *= 0.5; // Apply valley flattening

                sheep.position.set(x, y, z);
                scene.add(sheep);
            }
        }

        function createForegroundElements() {
            // Foreground Mount (a mound right in front of camera)
            const moundGeo = new THREE.CylinderGeometry(15, 15, 5, 16);
            const moundMat = new THREE.MeshStandardMaterial({ color: 0x6e8b3d, flatShading: true });
            const mound = new THREE.Mesh(moundGeo, moundMat);
            mound.position.set(0, -1, 20);
            mound.receiveShadow = true;
            mound.castShadow = true;
            scene.add(mound);

            // Rocks
            const rockGeo = new THREE.DodecahedronGeometry(1, 0);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, flatShading: true });
            
            for(let i=0; i<8; i++) {
                const rock = new THREE.Mesh(rockGeo, rockMat);
                const scale = 0.5 + Math.random() * 1.5;
                rock.scale.set(scale, scale * 0.7, scale);
                rock.position.set(
                    (Math.random() - 0.5) * 20,
                    1.5,
                    15 + Math.random() * 8
                );
                rock.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                rock.castShadow = true;
                rock.receiveShadow = true;
                scene.add(rock);
            }

            // Backpack (Stylized low-poly representation)
            const packGroup = new THREE.Group();
            
            // Main body
            const packBody = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2.5, 1.2),
                new THREE.MeshStandardMaterial({ color: 0x8b5a2b, flatShading: true })
            );
            packBody.position.y = 1.25;
            packBody.castShadow = true;
            packGroup.add(packBody);

            // Pockets
            const pocketGeo = new THREE.BoxGeometry(0.8, 1, 0.4);
            const pocketMat = new THREE.MeshStandardMaterial({ color: 0x7a4a1b, flatShading: true });
            const pocket1 = new THREE.Mesh(pocketGeo, pocketMat);
            pocket1.position.set(-0.5, 1, 0.7);
            pocket1.castShadow = true;
            packGroup.add(pocket1);
            
            const pocket2 = new THREE.Mesh(pocketGeo, pocketMat);
            pocket2.position.set(0.5, 1, 0.7);
            pocket2.castShadow = true;
            packGroup.add(pocket2);

            // Bedroll on top
            const rollGeo = new THREE.CylinderGeometry(0.5, 0.5, 2.2, 6);
            const rollMat = new THREE.MeshStandardMaterial({ color: 0x556b2f, flatShading: true });
            const roll = new THREE.Mesh(rollGeo, rollMat);
            roll.rotation.z = Math.PI / 2;
            roll.position.set(0, 2.8, 0);
            roll.castShadow = true;
            packGroup.add(roll);

            // Walking stick
            const stickGeo = new THREE.CylinderGeometry(0.08, 0.05, 4, 5);
            const stickMat = new THREE.MeshStandardMaterial({ color: 0x4a3018, flatShading: true });
            const stick = new THREE.Mesh(stickGeo, stickMat);
            stick.position.set(1.5, 2, 0);
            stick.rotation.set(0.2, 0, -0.4);
            stick.castShadow = true;
            packGroup.add(stick);

            // Position backpack in bottom right foreground
            packGroup.position.set(4, 1.5, 18);
            packGroup.rotation.y = -0.3;
            scene.add(packGroup);

            // Foreground legs (First person view) - Using CylinderGeometry for r128 compatibility
            const legGeo = new THREE.CylinderGeometry(0.8, 0.6, 3.5, 6);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, flatShading: true }); // Dark blue pants
            
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-1.5, -0.5, 22);
            leftLeg.rotation.x = -Math.PI / 3;
            leftLeg.rotation.z = -0.2;
            scene.add(leftLeg);

            const rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.position.set(1.5, -0.5, 22);
            rightLeg.rotation.x = -Math.PI / 3;
            rightLeg.rotation.z = 0.2;
            scene.add(rightLeg);

            // Instanced grass for performance
            const grassCount = 1500;
            const grassGeo = new THREE.ConeGeometry(0.15, 1.5, 3);
            // Shift pivot to bottom
            grassGeo.translate(0, 0.75, 0); 
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x5c7c2b, flatShading: true });
            const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, grassCount);
            
            const dummy = new THREE.Object3D();
            for(let i=0; i<grassCount; i++) {
                const x = (Math.random() - 0.5) * 30;
                const z = 12 + Math.random() * 12;
                
                // Add grass mainly on the foreground mound
                dummy.position.set(x, 1.5, z);
                
                // Random scale and slight tilt
                const scale = 0.5 + Math.random();
                dummy.scale.set(scale, scale * (1 + Math.random()), scale);
                dummy.rotation.set(
                    (Math.random() - 0.5) * 0.4, 
                    Math.random() * Math.PI, 
                    (Math.random() - 0.5) * 0.4
                );
                
                dummy.updateMatrix();
                grassMesh.setMatrixAt(i, dummy.matrix);
            }
            grassMesh.castShadow = true;
            scene.add(grassMesh);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Required for damping
            renderer.render(scene, camera);
        }

        // Boot up the scene
        window.onload = init;
    </script>
</body>
</html>

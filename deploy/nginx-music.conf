# Nginx config for music.livslusths.se
# Installed to /etc/nginx/sites-available/music.livslusths.se
# by the deploy workflow on first run; Certbot then adds the HTTPS server block
# and turns the HTTP block into a redirect automatically.

server {
    listen 80;
    server_name music.livslusths.se;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
